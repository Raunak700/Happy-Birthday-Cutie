<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Akansha ❤️</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

/* LEFT */
.left{
    width:50%;
    position:relative;
}

.bg-img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(10px) brightness(0.6);
}

.center-photo{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.main-img{
    width:260px;
    border-radius:20px;
    border:3px solid white;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* RIGHT */
.right{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffcce6,#ffe6f2);
}

/* SCREEN */
.screen{
    display:none;
    flex-direction:column;
    align-items:center;
    padding:25px;
    background:rgba(255,255,255,0.5);
    border-radius:20px;
    backdrop-filter:blur(10px);
}

.active{display:flex;}

h2{color:#ff4da6;}

/* KEYPAD */
.keypad{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:15px;
}

.key{
    width:65px;
    height:65px;
    border-radius:50%;
    border:none;
    background:#ff4da6;
    color:white;
    font-size:20px;
    cursor:pointer;
}

/* BUTTON */
.btn{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ff4da6;
    color:white;
    cursor:pointer;
}

/* GIFTS */
.gift-container{
    display:flex;
    gap:15px;
}

.gift{
    font-size:55px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<div class="container">

<!-- LEFT -->
<div class="left">
    <img class="bg-img" src="https://raw.githubusercontent.com/Raunak700/Happy-Birthday-Cutie/main/2026-04-18%2014.28.34.jpg">

    <div class="center-photo">
        <img class="main-img" src="https://raw.githubusercontent.com/Raunak700/Happy-Birthday-Cutie/main/2026-04-18%2014.28.34.jpg">
    </div>
</div>

<!-- RIGHT -->
<div class="right">

<!-- PASSCODE -->
<div id="screen1" class="screen active">
    <h2>Enter Passcode 💖</h2>
    <div id="display">_ _ _ _</div>
    <div class="keypad" id="keypad"></div>
</div>

<!-- CAKE -->
<div id="screen2" class="screen">
    <h2>Make a Wish Akansha ✨</h2>
    <div style="font-size:80px;">🎂</div>
    <button class="btn" onclick="startMusic()">Blow Candles 🎂</button>
</div>

<!-- GIFTS -->
<div id="screen3" class="screen">
    <h2>Pick a Gift 💝</h2>
    <div class="gift-container">
        <div class="gift" onclick="next('gift1')">🎁</div>
        <div class="gift" onclick="next('gift2')">🎁</div>
        <div class="gift" onclick="next('gift3')">🎁</div>
    </div>
</div>

<!-- GIFT 1 -->
<div id="gift1" class="screen">
    <h2>💌 For Akansha</h2>
    <p>You make my day better 😊</p>
    <button class="btn" onclick="next('screen3')">Back</button>
</div>

<!-- GIFT 2 -->
<div id="gift2" class="screen">
    <h2>🎟️ Special Coupon</h2>
    <p>1 Hug + 1 Movie Date 😏</p>
    <button class="btn" onclick="next('screen3')">Back</button>
</div>

<!-- GIFT 3 -->
<div id="gift3" class="screen">
    <h2>Happy Birthday Akansha ❤️</h2>
    <p>You make everything better 💫</p>
    <button class="btn" onclick="location.reload()">Restart</button>
</div>

</div>
</div>

<script>
// keypad
const keypad=document.getElementById('keypad');
[1,2,3,4,5,6,7,8,9,'⌫',0].forEach(n=>{
 let b=document.createElement('button');
 b.className='key';
 b.innerText=n;
 b.onclick=()=>press(n);
 keypad.appendChild(b);
});

let pass="";
let correct="1504";

function press(n){
 if(n==='⌫'){pass="";update();return;}
 if(pass.length<4){pass+=n;update();}

 if(pass.length===4){
  if(pass===correct){
    setTimeout(()=>next('screen2'),300);
  } else{
    alert("Wrong 😜");
    pass="";update();
  }
 }
}

function update(){
 document.getElementById("display").innerText=
 "• ".repeat(pass.length)+"_ ".repeat(4-pass.length);
}

// 🎶 MUSIC FUNCTION (WORKS ON MOBILE)
function startMusic(){
 let m=document.getElementById("music");
 m.volume=0.4;
 m.play().catch(()=>{});
 next('screen3');
}

function next(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
